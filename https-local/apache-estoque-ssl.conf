<VirtualHost _default_:443>
    DocumentRoot "C:/xampp2/htdocs"
    ServerName estoque-pedidos.local

    SSLEngine on
    SSLCertificateFile "C:/xampp2/apache/conf/ssl.crt/estoque-pedidos.pem"
    SSLCertificateKeyFile "C:/xampp2/apache/conf/ssl.key/estoque-pedidos-key.pem"

    <Directory "C:/xampp2/htdocs">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

